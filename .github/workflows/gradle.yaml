name: Java CI

on: [pull_request, push]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: 'adopt'
      - name: Run Gradle Tests
        uses: gradle/gradle-build-action@v2
        with:
          arguments: check 
